<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h1>Dynamic Pages</h1>
  <p-button label="Add Page" icon="pi pi-plus" (onClick)="openDialog()" />
</div>

<p-table [value]="pages" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
    <tr><th>Title</th><th>Slug</th><th>Status</th><th>Actions</th></tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.title }}</td>
      <td><code>/pages/{{ item.slug }}</code></td>
      <td><p-tag [value]="item.isPublished ? 'Published' : 'Draft'" [severity]="item.isPublished ? 'success' : 'warn'" /></td>
      <td>
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="edit(item)" />
        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(item)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [header]="editItem ? 'Edit Page' : 'Add Page'" [modal]="true" [style]="{ width: '800px' }" [maximizable]="true">
  <div class="form-grid">
    <div class="field"><label>Title</label><input pInputText [(ngModel)]="form.title" class="w-full" (blur)="autoSlug()" /></div>
    <div class="field"><label>Slug</label><input pInputText [(ngModel)]="form.slug" class="w-full" /></div>
    <div class="field full"><label>Meta Description</label><textarea pTextarea [(ngModel)]="form.metaDescription" rows="2" class="w-full"></textarea></div>
    <div class="field full">
      <label>Content</label>
      <app-rich-text-editor [(ngModel)]="form.content" />
    </div>
    <div class="field"><p-checkbox [(ngModel)]="form.isPublished" [binary]="true" label="Published" /></div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" (onClick)="save()" [loading]="saving" />
  </ng-template>
</p-dialog>
