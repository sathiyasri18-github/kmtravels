<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h1>Publications</h1>
  <p-button label="Add Publication" icon="pi pi-plus" (onClick)="openDialog()" />
</div>

<p-table [value]="publications" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
    <tr><th>Title</th><th>Type</th><th>Edition</th><th>Date</th><th>Status</th><th>Actions</th></tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.title }}</td>
      <td><p-tag [value]="getTypeLabel(item.type)" /></td>
      <td>{{ item.edition || '-' }}</td>
      <td>{{ item.publishedDate | date:'MMM yyyy' }}</td>
      <td><p-tag [value]="item.isPublished ? 'Published' : 'Draft'" [severity]="item.isPublished ? 'success' : 'warn'" /></td>
      <td>
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="edit(item)" />
        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(item)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [header]="editItem ? 'Edit Publication' : 'Add Publication'" [modal]="true" [style]="{ width: '700px' }">
  <div class="form-grid">
    <div class="field"><label>Title</label><input pInputText [(ngModel)]="form.title" class="w-full" /></div>
    <div class="field"><label>Type</label>
      <p-select [options]="typeOptions" [(ngModel)]="form.type" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
    <div class="field"><label>Edition</label><input pInputText [(ngModel)]="form.edition" class="w-full" /></div>
    <div class="field"><label>Published Date</label><input type="date" [(ngModel)]="form.publishedDate" class="w-full date-input" /></div>
    <div class="field full">
      <app-file-upload label="PDF File" folder="publications" [(url)]="form.pdfUrl" accept="application/pdf,.pdf" />
    </div>
    <div class="field full">
      <app-file-upload label="Cover Image" folder="publications" [(url)]="form.coverImageUrl" />
    </div>
    <div class="field full">
      <label>Description</label>
      <app-rich-text-editor [(ngModel)]="form.description" height="200px" />
    </div>
    <div class="field"><p-checkbox [(ngModel)]="form.isPublished" [binary]="true" label="Published" /></div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" (onClick)="save()" [loading]="saving" />
  </ng-template>
</p-dialog>
