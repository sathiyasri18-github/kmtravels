<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h1>Sectors Management</h1>
  <p-button label="Add Sector" icon="pi pi-plus" (onClick)="openDialog()" />
</div>

<p-table [value]="sectors" [paginator]="true" [rows]="10" [loading]="loading" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
    <tr>
      <th>Title</th>
      <th>Sort</th>
      <th>Images</th>
      <th>Status</th>
      <th style="width: 8rem">Actions</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>
        <strong>{{ item.title }}</strong>
        @if (item.subtitle) { <div class="text-muted">{{ item.subtitle }}</div> }
      </td>
      <td>{{ item.sortOrder }}</td>
      <td>{{ item.imageCount }}</td>
      <td>
        <p-tag [value]="item.isPublished ? 'Published' : 'Draft'"
               [severity]="item.isPublished ? 'success' : 'warn'" />
      </td>
      <td>
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="edit(item)" />
        <p-button icon="pi pi-eye" [rounded]="true" [text]="true" (onClick)="togglePublish(item)" />
        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(item)" />
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="5" class="text-center">No sectors found. Restart the API to seed the default sectors.</td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [header]="editItem ? 'Edit Sector' : 'Add Sector'"
          [modal]="true" [style]="{ width: '860px' }" [maximizable]="true">
  <div class="form-grid">
    <div class="field">
      <label>Title *</label>
      <input pInputText [(ngModel)]="form.title" class="w-full" (blur)="autoSlug()" />
    </div>
    <div class="field">
      <label>Subtitle</label>
      <input pInputText [(ngModel)]="form.subtitle" class="w-full" />
    </div>
    <div class="field full">
      <label>Content</label>
      <app-rich-text-editor [(ngModel)]="form.content" />
    </div>
    <div class="field full">
      <app-file-upload label="Cover Image" folder="sectors" [(url)]="form.coverImageUrl" />
    </div>

    <div class="field full">
      <div class="flex justify-content-between align-items-center mb-2">
        <label>Gallery Images</label>
        <p-button label="Add Image" icon="pi pi-plus" size="small" (onClick)="addImage()" />
      </div>
      @for (img of form.images; track $index; let i = $index) {
        <div class="image-row">
          <div class="field">
            <label>Title</label>
            <input pInputText [(ngModel)]="img.title" class="w-full" />
          </div>
          <div class="field">
            <app-file-upload label="Image" folder="sectors" [(url)]="img.imageUrl" />
          </div>
          <p-button icon="pi pi-trash" severity="danger" [text]="true" (onClick)="removeImage(i)" />
        </div>
      }
    </div>

    <div class="field">
      <label>Sort Order</label>
      <input pInputText type="number" [(ngModel)]="form.sortOrder" class="w-full" />
    </div>
    <div class="field">
      <p-checkbox [(ngModel)]="form.isFeatured" [binary]="true" label="Featured" />
    </div>
    <div class="field">
      <p-checkbox [(ngModel)]="form.isPublished" [binary]="true" label="Published" />
    </div>

    <div class="field full seo-section">
      <h3>SEO Optimization</h3>
      <div class="form-grid">
        <div class="field">
          <label>URL Slug</label>
          <input pInputText [(ngModel)]="form.slug" class="w-full" placeholder="auto-generated-from-title" />
        </div>
        <div class="field">
          <label>Meta Title</label>
          <input pInputText [(ngModel)]="form.metaTitle" class="w-full" />
        </div>
        <div class="field full">
          <label>Meta Description</label>
          <textarea pTextarea [(ngModel)]="form.metaDescription" rows="2" class="w-full"></textarea>
        </div>
        <div class="field full">
          <label>Meta Keywords</label>
          <input pInputText [(ngModel)]="form.metaKeywords" class="w-full" placeholder="comma, separated, keywords" />
        </div>
      </div>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" icon="pi pi-check" (onClick)="save()" [loading]="saving" />
  </ng-template>
</p-dialog>
