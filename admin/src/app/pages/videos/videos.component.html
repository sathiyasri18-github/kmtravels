<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h1>Video Management</h1>
  <p-button label="Add Video" icon="pi pi-plus" (onClick)="openDialog()" />
</div>

<p-table [value]="videos" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
    <tr><th>Title</th><th>Source</th><th>Category</th><th>Status</th><th>Actions</th></tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.title }}</td>
      <td><p-tag [value]="getSourceLabel(item.source)" /></td>
      <td>{{ item.category || '-' }}</td>
      <td><p-tag [value]="item.isPublished ? 'Published' : 'Draft'" [severity]="item.isPublished ? 'success' : 'warn'" /></td>
      <td>
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="edit(item)" />
        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(item)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [header]="editItem ? 'Edit Video' : 'Add Video'" [modal]="true" [style]="{ width: '700px' }">
  <div class="form-grid">
    <div class="field full"><label>Title</label><input pInputText [(ngModel)]="form.title" class="w-full" /></div>
    <div class="field"><label>Source</label>
      <p-select [options]="sourceOptions" [(ngModel)]="form.source" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
    <div class="field"><label>Category</label><input pInputText [(ngModel)]="form.category" class="w-full" /></div>
    @if (form.source === 2) {
      <div class="field full"><label>YouTube Video ID</label><input pInputText [(ngModel)]="form.youTubeId" class="w-full" placeholder="e.g. dQw4w9WgXcQ" /></div>
    } @else {
      <div class="field full"><label>Video URL</label><input pInputText [(ngModel)]="form.videoUrl" class="w-full" /></div>
    }
    <div class="field full">
      <app-file-upload label="Thumbnail" folder="videos" [(url)]="form.thumbnailUrl" />
    </div>
    <div class="field full">
      <label>Description</label>
      <app-rich-text-editor [(ngModel)]="form.description" height="200px" />
    </div>
    <div class="field"><p-checkbox [(ngModel)]="form.isPublished" [binary]="true" label="Published" /></div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" (onClick)="save()" [loading]="saving" />
  </ng-template>
</p-dialog>
