<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h1>Events</h1>
  <p-button label="Add Event" icon="pi pi-plus" (onClick)="openDialog()" />
</div>

<p-table [value]="events" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
    <tr><th>Title</th><th>Location</th><th>Start</th><th>End</th><th>Status</th><th>Actions</th></tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.title }}</td>
      <td>{{ item.location || '-' }}</td>
      <td>{{ item.startDate | date:'dd MMM yyyy' }}</td>
      <td>{{ item.endDate | date:'dd MMM yyyy' }}</td>
      <td><p-tag [value]="item.isPublished ? 'Published' : 'Draft'" [severity]="item.isPublished ? 'success' : 'warn'" /></td>
      <td>
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="edit(item)" />
        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(item)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [header]="editItem ? 'Edit Event' : 'Add Event'" [modal]="true" [style]="{ width: '700px' }">
  <div class="form-grid">
    <div class="field full"><label>Title</label><input pInputText [(ngModel)]="form.title" class="w-full" /></div>
    <div class="field"><label>Location</label><input pInputText [(ngModel)]="form.location" class="w-full" /></div>
    <div class="field"><label>Start Date</label><input type="datetime-local" [(ngModel)]="form.startDate" class="w-full date-input" /></div>
    <div class="field"><label>End Date</label><input type="datetime-local" [(ngModel)]="form.endDate" class="w-full date-input" /></div>
    <div class="field full"><app-file-upload label="Event Image" folder="events" [(url)]="form.imageUrl" /></div>
    <div class="field full">
      <label>Description</label>
      <app-rich-text-editor [(ngModel)]="form.description" />
    </div>
    <div class="field"><p-checkbox [(ngModel)]="form.isPublished" [binary]="true" label="Published" /></div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" severity="secondary" (onClick)="dialogVisible = false" />
    <p-button label="Save" (onClick)="save()" [loading]="saving" />
  </ng-template>
</p-dialog>
